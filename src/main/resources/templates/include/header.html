<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Finance Banking Demo</title>
    <!-- Server-side only link -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div th:fragment="alerts">
        <!-- Error Modal -->
        <div th:if="${error}" class="alert-overlay" id="error-modal">
            <div class="alert-modal">
                <div class="alert-title">[ 에러 ]</div>
                <div class="alert-message" th:text="${error}">에러 메시지</div>
                <div class="alert-action">
                    <button type="button" class="btn-modal" onclick="document.getElementById('error-modal').remove()">[
                        확인 ]</button>
                </div>
            </div>
        </div>

        <!-- Success Modal -->
        <div th:if="${message}" class="alert-overlay" id="success-modal">
            <div class="alert-modal">
                <div class="alert-title">[ 알림 ]</div>
                <div class="alert-message" th:text="${message}">성공 메시지</div>
                <div class="alert-action">
                    <button type="button" class="btn-modal"
                        onclick="document.getElementById('success-modal').remove()">[ 확인 ]</button>
                </div>
            </div>
        </div>

        <!-- Warning Modal -->
        <div th:if="${warning}" class="alert-overlay" id="warning-modal">
            <div class="alert-modal">
                <div class="alert-title">[ 시스템 알림 ]</div>
                <div class="alert-message" th:text="${warning}">경고 메시지</div>
                <div class="alert-action">
                    <button type="button" class="btn-modal"
                        onclick="document.getElementById('warning-modal').remove()">[ 확인 ]</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
