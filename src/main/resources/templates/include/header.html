<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Finance Banking Demo</title>
    <!-- Server-side only link -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:fragment="alerts" id="alert-container">
        <div th:if="${error}" class="alert error" onclick="this.remove()">
            <div class="alert-title">ERROR</div>
            <div class="alert-message" th:text="${error}">에러 메시지</div>
        </div>
        <div th:if="${message}" class="alert success" onclick="this.remove()">
            <div class="alert-title">SUCCESS</div>
            <div class="alert-message" th:text="${message}">성공 메시지</div>
        </div>
        <div th:if="${warning}" class="alert warning" onclick="this.remove()">
            <div class="alert-title">SYSTEM</div>
            <div class="alert-message" th:text="${warning}">경고 메시지</div>
        </div>
    </div>
</body>
</html>
