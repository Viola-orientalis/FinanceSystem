<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{include/header :: head('파이낸스 뱅킹 - 로그인')}"></head>

<body>
    <div th:replace="~{include/header :: alerts}"></div>

    <div class="container">
        <div class="panel">
            <h1 class="text-center">로그인</h1>

            <div th:if="${param.error}" style="color: red; text-align: center; margin-bottom: 15px;">
                아이디 또는 비밀번호를 다시 확인하세요.
            </div>

            <form action="/auth" method="post">
                <div class="form-group">
                    <label for="userId">아이디</label>
                    <input type="text" id="userId" name="userid" placeholder="아이디 입력" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
                </div>

                <button type="submit" class="mb-1">로그인</button>
                <a th:href="@{/signup}" class="btn secondary">회원가입</a>
            </form>
        </div>
    </div>
</body>

</html>
